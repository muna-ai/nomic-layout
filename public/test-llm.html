<!DOCTYPE html>
<html>
<head>
    <title>LLM Test</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        #log { white-space: pre-wrap; background: #f5f5f5; padding: 10px; margin-top: 10px; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; }
    </style>
</head>
<body>
    <h1>LLM Local Test</h1>
    <button id="testBtn">Test @anon/smollm_2_135m</button>
    <div id="log"></div>

    <script>
        const log = (msg) => {
            document.getElementById('log').textContent += msg + '\n';
            console.log(msg);
        };

        const testLLM = async () => {
            document.getElementById('log').textContent = '';
            log('Starting SmolLM test...');

            try {
                log('Making direct API call to /api/muna/predictions...');

                const response = await fetch('/api/muna/predictions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tag: "@anon/smollm_2_135m",
                        inputs: {
                            messages: [{ role: "user", content: "What is 2+2?" }]
                        },
                        acceleration: "local_auto",
                        client: "test-page"
                    })
                });

                const data = await response.json();

                log('Response received!');
                log('Status: ' + response.status);
                log('Data: ' + JSON.stringify(data, null, 2));

                if (data.error) {
                    log('\n❌ Error: ' + data.error);
                } else if (data.results) {
                    log('\n✅ SUCCESS!');
                    log('Result: ' + JSON.stringify(data.results[0], null, 2));
                }
            } catch (error) {
                log('\n❌ ERROR: ' + error.message);
                log('Stack: ' + error.stack);
            }
        };

        document.getElementById('testBtn').addEventListener('click', testLLM);
    </script>
</body>
</html>
